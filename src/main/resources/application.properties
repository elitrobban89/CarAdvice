server.port=8080

# Sätt GROQ_API_KEY som miljövariabel – hårdkoda aldrig nyckeln!
groq.api.key=${GROQ_API_KEY}
groq.model=llama-3.3-70b-versatile

# PostgreSQL på Render; H2 in-memory som fallback lokalt
spring.datasource.url=${DB_URL:jdbc:h2:mem:caradvice;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

admin.key=${ADMIN_KEY:caradvice-admin-2024}

stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price.id=${STRIPE_PRICE_ID:}
app.base.url=${APP_BASE_URL:http://localhost:8080}

cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://elitrobban.se,http://localhost:8080,http://localhost:3000}

logging.level.com.caradvice=DEBUG
