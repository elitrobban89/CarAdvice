server.port=8080

# Gzip-komprimering — minskar JS/JSON med ~70%
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Browser-cache: no-cache tvingar revalidering vid varje besök (ETag 304 om oförändrat)
# Säkerställer att besökare alltid får ny JS direkt efter deploy
spring.web.resources.cache.cachecontrol.no-cache=true

# Sätt GROQ_API_KEY som miljövariabel – hårdkoda aldrig nyckeln!
groq.api.key=${GROQ_API_KEY}
groq.model=openai/gpt-oss-120b
groq.chat.model=openai/gpt-oss-20b

# PostgreSQL på Render; H2 in-memory som fallback lokalt
spring.datasource.url=${DB_URL:jdbc:h2:mem:caradvice;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

admin.key=${ADMIN_KEY}

stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price.id=${STRIPE_PRICE_ID:}
app.base.url=${APP_BASE_URL:http://localhost:8080}

cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://elitrobban.se,http://localhost:8080,http://localhost:3000}

logging.level.com.caradvice=INFO
