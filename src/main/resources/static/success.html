<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betalning lyckades – BilRådgivning</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); padding: 48px 40px; width: 100%; max-width: 420px; text-align: center; }
  .icon { font-size: 4rem; margin-bottom: 16px; }
  h1 { color: #1a1a2e; font-size: 1.6rem; margin-bottom: 12px; }
  p { color: #555; line-height: 1.6; }
  .btn { display: inline-block; margin-top: 28px; padding: 13px 32px; background: #1a1a2e; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 1rem; }
  .btn:hover { background: #2d2d4e; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Betalning lyckades!</h1>
  <p>Välkommen som prenumerant! Du har nu obegränsad åtkomst till AI-bilrådgivningen.</p>
  <p style="margin-top:12px;font-size:0.9rem;color:#888;">Din prenumeration aktiveras inom några sekunder.</p>
  <a href="javascript:window.close()" class="btn">Stäng detta fönster</a>
</div>
<script>
// Update localStorage status and notify opener
localStorage.setItem('ca_status', 'active');
if (window.opener) {
  const token = localStorage.getItem('ca_token');
  const email = localStorage.getItem('ca_email');
  window.opener.postMessage({ type: 'CA_SUBSCRIBED', token, email, status: 'active' }, '*');
}
</script>
</body>
</html>
