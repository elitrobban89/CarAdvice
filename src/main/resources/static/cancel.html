<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betalning avbruten – BilRådgivning</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); padding: 48px 40px; width: 100%; max-width: 420px; text-align: center; }
  .icon { font-size: 4rem; margin-bottom: 16px; }
  h1 { color: #1a1a2e; font-size: 1.6rem; margin-bottom: 12px; }
  p { color: #555; line-height: 1.6; }
  .btn { display: inline-block; margin-top: 28px; padding: 13px 32px; background: #635bff; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 1rem; cursor: pointer; border: none; }
  .btn:hover { background: #4f46e5; }
  .btn-close { display: inline-block; margin-top: 12px; padding: 10px 24px; background: transparent; color: #666; border: 1px solid #ddd; border-radius: 8px; text-decoration: none; font-size: 0.9rem; cursor: pointer; border: 1px solid #ddd; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">❌</div>
  <h1>Betalning avbruten</h1>
  <p>Ingen betalning har genomförts. Du kan försöka igen när du vill.</p>
  <br>
  <button class="btn" onclick="tryAgain()">Försök igen</button>
  <br>
  <a href="javascript:window.close()" class="btn-close">Stäng</a>
</div>
<script>
function tryAgain() {
  window.location.href = '/subscribe.html';
}
</script>
</body>
</html>
